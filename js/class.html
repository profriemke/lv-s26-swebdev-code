<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .quadrat {
            width: 100px;
            height: 100px;
            background-color: green;
        }

        .kreis {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            border-radius: 51%;
        }
    </style>
</head>

<body>
    <div class="kreis" id="box"></div>
    <button onclick="quadrat()">Quadrat</button>
    <button onclick="kreis()">Kreis</button>

    <script>
        const box = document.getElementById('box')

        function quadrat() {
            box.classList.add('quadrat')
            box.classList.remove('kreis')
            
            
        }

        function kreis() {
            box.classList.add('kreis')
            box.classList.remove('quadrat')
        }
    </script>
</body>

</html>
