<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <style>
        .pixelify> {
            font-family: "Pixelify Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        #ergebnis {
            width: 200px;
            height: 40px;
            text-align: end;
            border: 1px solid rgb(125, 125, 125);
            font-family: "Pixelify Sans", sans-serif;
            font-size: 2em;
            border-radius: 10px;
            padding: 5px 8px 5px 5px;
            background-color: rgb(197, 202, 209);
            box-shadow: inset 3px 3px 5px rgba(0, 0, 0, 0.1);
        }

        #tastatur {
            margin-top: 20px;
        }

        .taste {
            width: 60px;
            height: 40px;

            border: 2px solid rgb(142, 170, 210);
            background-color: rgb(142, 170, 210);
            font-family: Arial;
            font-size: 2em;
            text-align: center;
            vertical-align: middle;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);


        }

        .taste:active {
            background-color: rgb(120, 150, 190);
        }

        .tastenreihe {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding-left: 0px;
        }

        #rechner {
            padding: 20px;
            border: 4px solid grey;
            width: 220px;
            border-radius: 10px;
            background-color: rgb(222, 221, 221);
            ;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
        }

        .riemkio {
            font-family: Arial, sans-serif;
            font-size: 0.5em;

        }
    </style>
</head>

<body>
    <div id="rechner">
        <div id="ergebnis" class="pixelify">0</div>
        <div id="tastatur">
            <div class="tastenreihe riemkio">Riemkio OM-7 non-scientific calulator</div>

            <div class="tastenreihe">
                <div id="1" class="taste">1</div>
                <div id="2" class="taste">2</div>
                <div id="3" class="taste">3</div>
            </div>
            <div class="tastenreihe">
                <div id="4" class="taste">4</div>
                <div id="5" class="taste">5</div>
                <div id="6" class="taste">6</div>
            </div>
            <div class="tastenreihe">
                <div id="7" class="taste">7</div>
                <div id="8" class="taste">8</div>
                <div id="9" class="taste">9</div>
            </div>
            <div class="tastenreihe">
                <div id="0" class="taste">0</div>
                <div id="plus" class="taste">+</div>
                <div id="minus" class="taste">-</div>
            </div>
            <div class="tastenreihe">
                <div id="geteilt" class="taste">&divide;</div>
                <div id="mal" class="taste">*</div>
                <div id="gleich" class="taste">=</div>
            </div>
        </div>
    </div>
</body>

</html>
