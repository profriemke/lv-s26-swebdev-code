<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <style>
        .pixelify> {
            font-family: "Pixelify Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        #ergebnis {
            width: 200px;
            height: 40px;
            text-align: end;
            border: 1px solid rgb(125, 125, 125);
            font-family: "Pixelify Sans", sans-serif;
            font-size: 2em;
            border-radius: 10px;
            padding: 5px 8px 5px 5px;
            background-color: rgb(197, 202, 209);
            box-shadow: inset 3px 3px 5px rgba(0, 0, 0, 0.1);
        }

        #tastatur {
            margin-top: 20px;
        }

        .taste {
            width: 60px;
            height: 40px;

            border: 2px solid rgb(142, 170, 210);
            background-color: rgb(142, 170, 210);
            font-family: Arial;
            font-size: 2em;
            text-align: center;
            vertical-align: middle;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);


        }

        .taste:active {
            background-color: rgb(120, 150, 190);
        }

        .tastenreihe {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding-left: 0px;
        }

        #rechner {
            padding: 20px;
            border: 4px solid grey;
            width: 220px;
            border-radius: 10px;
            background-color: rgb(222, 221, 221);
            ;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
        }

        .riemkio {
            font-family: Arial, sans-serif;
            font-size: 0.5em;

        }
    </style>
</head>

<body>
    <div id="rechner">
        <div id="ergebnis" class="pixelify">0</div>
        <div id="tastatur">
            <div class="tastenreihe riemkio">Riemkio OM-7 non-scientific calulator</div>

            <div class="tastenreihe">
                <div id="1" class="taste">1</div>
                <div id="2" class="taste">2</div>
                <div id="3" class="taste">3</div>
            </div>
            <div class="tastenreihe">
                <div id="4" class="taste">4</div>
                <div id="5" class="taste">5</div>
                <div id="6" class="taste">6</div>
            </div>
            <div class="tastenreihe">
                <div id="7" class="taste">7</div>
                <div id="8" class="taste">8</div>
                <div id="9" class="taste">9</div>
            </div>
            <div class="tastenreihe">
                <div id="0" class="taste">0</div>
                <div id="plus" class="taste">+</div>
                <div id="minus" class="taste">-</div>
            </div>
            <div class="tastenreihe">
                <div id="geteilt" class="taste">&divide;</div>
                <div id="mal" class="taste">*</div>
                <div id="gleich" class="taste">=</div>
            </div>
        </div>
    </div>
    <script>
        const tastatur = document.getElementById('tastatur')
        const ergebnis = document.getElementById('ergebnis')
        let state = 'firstNumber'
        let firstNumber = 0
        let secondNumber = 0
        let result = 0
        let operation = ''

        tastatur.addEventListener('click', (e) => {
            let id = e.target.id
            if (isNaN(parseInt(id))) {
                // irgendwas
                console.log('keine Zahl')
                if (state == 'operation' && id != 'gleich') {
                    console.log('state: operation nicht gleich')
                    operation = id
                    state = 'secondNumber'
                    console.log('State:', state)
                }
                if (state == 'result' && id == 'gleich') {
                    if (operation == 'mal') {
                        result = firstNumber * secondNumber
                    }
                    if (operation == 'geteilt') {
                        result = firstNumber / secondNumber
                    }
                    if (operation == 'plus') {
                        result = firstNumber + secondNumber
                    }
                    if (operation == 'minus') {
                        result = firstNumber - secondNumber
                    }
                    ergebnis.innerText = result
                    state = 'firstNumber'
                    firstNumber = 0
                    seconNumber = 0
                }
            } else {
                // Zahl
                console.log('Zahl: ', id, 'State: ', state)
                if (state == 'firstNumber') {
                    firstNumber = parseInt(id)
                    state = 'operation'
                    ergebnis.innerText = firstNumber
                }
                if (state == 'secondNumber') {
                    console.log('state: seconNumber')
                    secondNumber = parseInt(id)
                    state = 'result'
                    ergebnis.innerText = secondNumber
                }

            }


        })


    </script>
</body>

</html>
