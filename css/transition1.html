<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            position:absolute;
            top: 10px;
            background-color: lightblue;
            transition: top 4s, width 1s, height 2s, background-color 3s;
           
        }
        div:hover{
             width: 200px;
             height: 200px;
             background-color: red;       
             top: 40px; 
            }
        div #smile{
            opacity: 0;
            transition: opacity 10s;
        }
        div:hover #smile{
            opacity: 1;
        }
    </style>
</head>
<body>
    <div>hallo OMM <span id="smile">😎</span></div>
</body>
</html>
