<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: rgb(96, 24, 212);
            color: white;
            width: 80px;
            padding: 5px;
            border-radius: 5px;
            transition: background-color 0.6s;
        }

        button:hover{
            border-color: rgb(88, 88, 240);
            background-color: rgb(130, 73, 223);;
        }
    </style>
</head>
<body>
    <button>glowy</button>
</body>
</html>
