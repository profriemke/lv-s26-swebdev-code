<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .classdot {
            width: 20px;
            height: 20px;
            background-color: black;
            border-radius: 50%;
            margin: 2px;
        }
        .dotcontainer {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        @keyframes dotAnimation {
            0% { opacity: 0;  }
            10% { opacity: 0; }
            20% { opacity: 1; }
            70% { opacity: 1;  }
            90% { opacity: 0;}
            100% { opacity: 0; }
        }
        #dot1 {
            animation: dotAnimation 1.5s infinite;
        }
        #dot2 {           
            animation: dotAnimation 1.5s infinite 0.2s;
        }
        #dot3 {
            animation: dotAnimation 1.5s infinite 0.4s;
        }   
    </style>
</head>
<body>
    <div class="dotcontainer">
        <div class="classdot" id="dot1"></div>      
        <div class="classdot" id="dot2"></div>
        <div class="classdot" id="dot3"></div>   
    </div>
  
</body>
</html>
